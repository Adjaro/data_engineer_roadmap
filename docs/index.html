  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;background:#06060a;color:#d4d4d8;font-family:'Instrument Sans','DM Sans',system-ui,sans-serif}

    /* Header */

    .toolbox-panel.open{display:block}
    .tool-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1e1e24}
    .tool-row:last-child{border-bottom:none}
    .tool-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;width:20px;text-align:right}
    .tool-name{font-weight:600;font-size:13px;color:#e4e4e7;margin-bottom:2px}
    .tool-why{font-size:12px;color:#71717a;line-height:17px}
    .viz-box{margin-top:14px;padding:10px 12px;border-radius:8px;background:#0d0d12;border:1px solid #27272a}
    .viz-title{font-size:11px;font-weight:600;color:#fbbf24;margin-bottom:6px}
    .viz-item{font-size:12px;color:#a1a1aa;margin-bottom:6px;line-height:17px}

    .proj-btn .lbl{font-size:10px;font-weight:600;letter-spacing:.5px;text-align:center;line-height:13px}

    /* Project detail */
    .detail{max-width:760px;margin:0 auto;padding:0 20px 40px}
    .title-card{background:#111116;border-radius:14px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
    .title-card-glow{position:absolute;top:0;right:0;width:120px;height:120px}
    .section-tag{display:inline-block;font-family:'JetBrains Mono','Fira Code',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:4px}

    .title-card p{font-size:13px;color:#a1a1aa;line-height:20px;margin:0}
    .duration{font-family:'JetBrains Mono',monospace;font-size:10px;color:#52525b}

    /* Sources */
    .sources{background:#0d0d12;border-radius:12px;border:1px solid #1e1e24;padding:16px;margin-bottom:16px}
    .sources-title{font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:10px;letter-spacing:.5px}
    .source-row{padding:8px 0;border-bottom:1px solid #1e1e24}
    .source-row:last-child{border-bottom:none}
    .source-name{font-weight:600;font-size:13px;color:#e4e4e7}
    .source-url{font-family:'JetBrains Mono',monospace;font-size:10px;margin-left:8px}
    .source-detail{font-size:12px;color:#71717a;line-height:17px}

    .sec-tabs{display:flex;margin-bottom:16px;border-radius:8px;overflow:hidden;border:1px solid #27272a}
    .sec-tab{flex:1;padding:10px 8px;border:none;background:transparent;color:#71717a;font-weight:500;font-size:12px;cursor:pointer;transition:all .3s;font-family:inherit}
    .sec-tab.active{font-weight:700;color:#06060a}

    /* Pipeline */
    .step-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #1e1e24}
    .step-row:last-child{border-bottom:none}
    .step-num{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}

    .concepts-box{background:#0d0d12;border-radius:10px;border:1px solid #1e1e24;padding:14px;margin-top:16px}
    .concepts-title{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
    .concepts-wrap{display:flex;flex-wrap:wrap;gap:6px}
    .concept-pill{font-size:11px;padding:4px 10px;border-radius:5px;background:#111116;color:#a1a1aa}

    /* Monitoring */
    .mon-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e24}
    .mon-row:last-child{border-bottom:none}
    .mon-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
    .mon-text{font-size:13px;line-height:20px;color:#d4d4d8}

    /* Viz */
    .viz-tool-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px 14px;border-radius:8px;background:#111116;border:1px solid #27272a}
    .viz-tool-icon{font-size:20px}
    .viz-tool-name{font-weight:600;font-size:13px;color:#e4e4e7}
    .viz-tool-sub{font-size:11px;color:#71717a}
    .dash-title{font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
    .dash-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e24}
    .dash-row:last-child{border-bottom:none}
    .dash-arrow{flex-shrink:0;font-size:13px}
    .dash-text{font-size:13px;line-height:20px;color:#d4d4d8}
    .results-box{margin-top:16px;padding:14px;border-radius:10px}
    .results-title{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
    .results-text{font-size:13px;color:#a1a1aa;line-height:20px}

    /* Progress */
    .progress-bar{position:fixed;bottom:0;left:0;right:0;height:3px;background:#111116}
    .progress-fill{height:100%;transition:width .5s ease;border-radius:0 2px 2px 0;background:linear-gradient(90deg,#22d3ee,#a78bfa,#f97316,#10b981,#ec4899)}

    .hidden{display:none}
  </style>
</head>

pipeline:{title:"Pipeline CDC + Multi-source",steps:["App source : PostgreSQL avec un simulateur Python qui INSERT/UPDATE des commandes, clients, produits","CDC Debezium : capture chaque changement en temps réel → topics Kafka (1 topic par table)","Stream processing : Consumer Python qui applique les changements au Data Lake (MinIO/Delta) en quasi temps réel","Batch enrichissement (Airflow + dbt) : jointures avec GitHub Events et JSONPlaceholder, agrégations Gold","SCD Type 2 automatisé : le CDC + Delta Lake MERGE gère nativement l'historisation des changements","Data Contracts : fichiers YAML définissant le schéma attendu entre producteur et consommateur, validés par CI","DataHub : ingestion automatique des métadonnées dbt + lineage + tags de classification"],concepts:["Change Data Capture (CDC)","Debezium + Kafka Connect","Data Contracts (schéma-first)","Data Catalog & Lineage (DataHub)","SCD Type 2 via CDC","Event Sourcing patterns","Multi-source integration","Separation of concerns","Documentation-as-code"]},
monitoring:{title:"Observabilité Production-Grade",items:["Prometheus : métriques de chaque composant (Kafka, Spark, Airflow, PostgreSQL, MinIO)","Grafana : 3 dashboards — Infra (CPU, mémoire, disque), Pipeline (latence, throughput), Data Quality (tests, freshness)","SLOs/SLIs data : 'Les données Gold doivent être fraîches de moins de 15 min' — mesuré et alerté","Alerting Grafana : PagerDuty-style avec escalade (warning → critical)","Dead Letter Queue monitoring : dashboard dédié avec analyse des causes d'erreur","DataHub : lineage visuel de bout en bout (source → kafka → bronze → silver → gold → dashboard)","Runbook : document Markdown pour chaque type d'incident (pipeline en retard, DLQ qui grossit, test GE échoué)"]},
viz:{tool:"superset",title:"Dashboards Business + Plateforme",dashboards:["Vue 360° client : historique de commandes, changements d'adresse (SCD2), activité GitHub associée","KPIs business en quasi temps réel : commandes/heure, CA cumulé, panier moyen glissant","Dashboard Data Platform : santé de chaque composant, latence CDC, freshness par table Gold","Analyse de la qualité : % de lignes valides par source, tendance sur 30 jours, top erreurs","Data Catalog (DataHub UI) : explorer les tables, voir la lineage, chercher par tag"],results:"Tu dois pouvoir répondre à : 'Si je modifie un client dans l'app, en combien de temps c'est visible dans le dashboard ?' , 'Quelle est la santé globale de ma plateforme ?' , et 'Quel est le parcours complet d'une donnée de la source au dashboard ?'"}}
];

let activeProject=0, activeSection="pipeline", showStack=false;

function toggleStack(){
  showStack=!showStack;
  document.getElementById("toolboxBtn").classList.toggle("open",showStack);
  document.getElementById("toolboxArrow").classList.toggle("open",showStack);
  document.getElementById("toolboxPanel").classList.toggle("open",showStack);
}

function setSection(s){activeSection=s;render()}

function render(){
  const p=PROJECTS[activeProject];

  // Header
  document.getElementById("headerBg").style.background=`radial-gradient(ellipse at 50% 0%,${p.color}10 0%,transparent 70%)`;
  document.getElementById("headerTag").style.color=p.color;

  // Toolbox
  const tb=document.getElementById("toolboxPanel");
  let th="";
  STACK_CORE.forEach((t,i)=>{
    th+=`<div class="tool-row"><span class="tool-num" style="color:${p.color}">${i+1}</span><div><div class="tool-name">${t.name}</div><div class="tool-why">${t.why}</div></div></div>`;
  });
  th+=`<div class="viz-box"><div class="viz-title">📊 Outils de Visualisation</div>`;
  Object.values(VIZ_TOOLS).forEach(v=>{
    th+=`<div class="viz-item"><b>${v.icon} ${v.name}</b> — ${v.desc}</div>`;
  });
  th+=`</div>`;
  tb.innerHTML=th;
  document.getElementById("toolboxBtn").style.setProperty("--c",p.color);

  // Project selector
  const ps=document.getElementById("projSelector");
  ps.innerHTML="";
  PROJECTS.forEach((proj,i)=>{
    const btn=document.createElement("button");
    btn.className="proj-btn"+(activeProject===i?" active":"");
    btn.style.setProperty("--c",proj.color);
    btn.style.setProperty("--bg",proj.color+"12");
    if(activeProject===i){btn.style.borderColor=proj.color;btn.style.background=proj.color+"12";btn.style.color=proj.color}
    btn.innerHTML=`<span class="num">${proj.id}</span><span class="lbl">${proj.level}</span>`;
    btn.onclick=()=>{activeProject=i;activeSection="pipeline";render()};
    ps.appendChild(btn);
  });

  // Title card
  document.getElementById("titleCard").innerHTML=`
    <div class="title-card-glow" style="background:radial-gradient(circle at 100% 0%,${p.color}12,transparent 70%)"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
      <span class="section-tag" style="color:${p.color};background:${p.color}15;border:1px solid ${p.color}30">${p.level}</span>
      <span class="duration">⏱ ${p.duration}</span>
    </div>
    <h2>Projet ${p.id} — ${p.title}</h2>
    <p>${p.description}</p>`;
  document.getElementById("titleCard").style.borderColor=p.color+"30";

  // Sources
  let sh=`<div class="sources-title">📡 SOURCES DE DONNÉES</div>`;
  p.sources.forEach(s=>{
    sh+=`<div class="source-row"><div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span class="source-name">${s.name}</span><span class="source-url" style="color:${p.color}">${s.url}</span></div><div class="source-detail">${s.detail}</div></div>`;
  });
  document.getElementById("sourcesPanel").innerHTML=sh;

  // Stack pills
  document.getElementById("stackPills").innerHTML=p.stack.map(s=>`<span class="stack-pill">${s}</span>`).join("");

  // Section tabs
  document.querySelectorAll(".sec-tab").forEach(btn=>{
    const isActive=btn.dataset.sec===activeSection;
    btn.classList.toggle("active",isActive);
    btn.style.background=isActive?p.color:"transparent";
    btn.style.color=isActive?"#06060a":"#71717a";
  });

  // Section content
  const sc=document.getElementById("sectionContent");
  if(activeSection==="pipeline"){
    let h="";
    p.pipeline.steps.forEach((step,i)=>{
      h+=`<div class="step-row"><div class="step-num" style="background:${p.color}18;border:1px solid ${p.color}30;color:${p.color}">${i+1}</div><div class="step-text">${step}</div></div>`;
    });
    h+=`<div class="concepts-box"><div class="concepts-title" style="color:${p.color}">CONCEPTS CLÉS À MAÎTRISER</div><div class="concepts-wrap">`;
    p.pipeline.concepts.forEach(c=>{
      h+=`<span class="concept-pill" style="border:1px solid ${p.color}25">${c}</span>`;
    });
    h+=`</div></div>`;
    sc.innerHTML=h;
  }else if(activeSection==="monitoring"){
    let h="";
    p.monitoring.items.forEach((item,i)=>{
      const col=i<2?"#ef4444":i<4?"#fbbf24":"#22c55e";
      const shadow=i<2?"box-shadow:0 0 8px #ef444444;":"";
      h+=`<div class="mon-row"><span class="mon-dot" style="background:${col};${shadow}"></span><span class="mon-text">${item}</span></div>`;
    });
    sc.innerHTML=h;
  }else{
    const vt=VIZ_TOOLS[p.viz.tool];
    let h=`<div class="viz-tool-bar"><span class="viz-tool-icon">${vt.icon}</span><div><div class="viz-tool-name">${vt.name}</div><div class="viz-tool-sub">Outil utilisé pour ce projet</div></div></div>`;
    h+=`<div class="dash-title" style="color:${p.color}">DASHBOARDS À CONSTRUIRE</div>`;
    p.viz.dashboards.forEach(d=>{
      h+=`<div class="dash-row"><span class="dash-arrow" style="color:${p.color}">→</span><span class="dash-text">${d}</span></div>`;
    });
    h+=`<div class="results-box" style="background:${p.color}08;border:1px solid ${p.color}25"><div class="results-title" style="color:${p.color}">🎯 RÉSULTATS ATTENDUS</div><div class="results-text">${p.viz.results}</div></div>`;
    sc.innerHTML=h;
  }

  // Progress
  document.getElementById("progressFill").style.width=((activeProject+1)/PROJECTS.length*100)+"%";
}

render();
</script>
</body>
</html>
